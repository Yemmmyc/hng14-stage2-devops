name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- PYTHON SETUP (API + WORKER) ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        working-directory: ./api
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Worker dependencies
        working-directory: ./worker
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python basic syntax check
        run: |
          python -m compileall api worker

      # ---------- FRONTEND SETUP ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Basic frontend validation
        working-directory: ./frontend
        run: npm run || echo "No test script defined"

  docker-build-check:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images (API, Worker, Frontend)
        run: |
          docker build -t api ./api
          docker build -t worker ./worker
          docker build -t frontend ./frontend
