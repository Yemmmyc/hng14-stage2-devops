name: DevOps Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

# ---------------- LINT ----------------
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Run Hadolint on Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true


# ---------------- TEST ----------------
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: pytest api/tests -v --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ---------------- BUILD ----------------
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ---------------- SECURITY SCAN ----------------
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build images for scan
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Run Trivy scan (SARIF)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/work \
            aquasec/trivy:latest image \
            --exit-code 0 \
            --severity CRITICAL \
            --format sarif \
            --output /work/trivy.sarif \
            api:latest

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION TEST ----------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create env file from secrets
        run: |
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" > .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "API_URL=${{ secrets.API_URL }}" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Attempt $i/24"
            sleep 5
          done

      - name: Create job via API
        run: |
          curl -X POST http://localhost:8000/jobs

      - name: Shutdown stack
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rolling deploy simulation
        run: |
          docker compose up -d --build
          sleep 10
          docker compose ps


# ---------------- TEARDOWN ----------------
  teardown:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    needs: [integration]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop containers
        run: docker compose down -v