name: DevOps Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 linting
        run: flake8 api worker || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Run Hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r api/requirements.txt

      - name: Run pytest
        run: pytest api/tests -v --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: |
            localhost:5000/api:latest
            localhost:5000/api:${{ github.sha }}


      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: |
            localhost:5000/worker:latest
            localhost:5000/worker:${{ github.sha }}


      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: |
            localhost:5000/frontend:latest
            localhost:5000/frontend:${{ github.sha }}



# ---------------- SECURITY SCAN ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build images for scan
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:latest
          format: sarif
          output: trivy.sarif
          severity: CRITICAL

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION TEST ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "REDIS_HOST=redis" > .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API (robust)
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "API is up!"
              break
            fi
            echo "Attempt $i/24 — waiting 5s..."
            sleep 5
            if [ $i -eq 24 ]; then
              echo "API never became ready. Logs:"
              docker compose logs
              exit 1
            fi
          done

      - name: Test job flow
        run: |
          curl -X POST http://localhost:8000/job

      - name: Shutdown stack
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulated rolling deploy
        run: |
          docker compose up -d --build
          sleep 10
          docker compose ps


# ---------------- TEARDOWN ----------------
  teardown:
    runs-on: ubuntu-latest
    if: always()
    needs: [integration]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop containers
        run: docker compose down -v