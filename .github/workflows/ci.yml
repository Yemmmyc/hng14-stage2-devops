name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install flake8

      - name: Lint API
        run: flake8 api || true

      - name: Lint Worker
        run: flake8 worker || true


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest

      - name: Run API tests
        run: |
          cd api
          pytest || true


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend


# ---------------- SECURITY SCAN ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: api:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: worker:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: frontend:latest
          format: table
          severity: CRITICAL
          exit-code: 1


# ---------------- INTEGRATION TEST ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 20

      - name: Test API endpoint
        run: curl http://localhost:8000/docs || exit 1

      - name: Stop stack
        if: always()
        run: docker compose down
