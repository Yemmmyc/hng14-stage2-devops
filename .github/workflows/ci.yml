name: DevOps Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

# ---------------- LINT ----------------
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8
      - run: flake8 api worker || true

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Frontend lint
        run: |
          cd frontend
          npm install
          npx eslint . || true

      - name: Hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile || true
          docker run --rm -i hadolint/hadolint < worker/Dockerfile || true
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile || true


# ---------------- TEST ----------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install pytest pytest-cov
          pip install -r api/requirements.txt

      - run: pytest api/tests -v --cov=api --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml


# ---------------- BUILD ----------------
  build:
    name: Build Images (Cached)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ---------------- SECURITY ----------------
  security:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t api:latest ./api

      - name: Run Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/work \
            aquasec/trivy:latest image \
            --format sarif \
            --output /work/trivy.sarif \
            api:latest || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION ----------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API (stable probe)
        run: |
         for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/health > /dev/null; then
            echo "API ready"
            exit 0
          fi
          echo "waiting..."
          sleep 3
         done

      - name: Test endpoint
        run: curl -X POST http://localhost:8000/jobs

      - name: Shutdown
        if: always()
        run: docker compose down -v


# ---------------- DEPLOY ----------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build