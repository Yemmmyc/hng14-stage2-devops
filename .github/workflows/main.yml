name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Lint Python (flake8)
        run: flake8 api/ worker/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install eslint
        run: npm install -g eslint@8
        
      # Since there's no eslintrc by default, we just init a basic one or pass
      - name: Create basic eslint config
        run: echo '{"env":{"node":true,"es2021":true},"extends":"eslint:recommended","parserOptions":{"ecmaVersion":12}}' > frontend/.eslintrc.json
        
      - name: Lint JavaScript (eslint)
        run: eslint frontend/app.js
        
      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "api/Dockerfile"
          
      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "worker/Dockerfile"
          
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "frontend/Dockerfile"

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx
          
      - name: Run pytest
        run: |
          cd api
          pytest --cov=. --cov-report=xml
          
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      
      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          
      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          
      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security_scan:
    needs: build
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      
      # We need to rebuild since jobs run on different runners. Or we could save/load images,
      # but it's simpler to rebuild or use the action to build and scan directly.
      - name: Build local images for scan
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend
          
      - name: Run Trivy vulnerability scanner for API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api:latest'
          format: 'sarif'
          output: 'trivy-api-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          
      - name: Run Trivy for Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'worker:latest'
          format: 'sarif'
          output: 'trivy-worker-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          
      - name: Run Trivy for Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api-results.sarif'
          category: 'api'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-worker-results.sarif'
          category: 'worker'
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'frontend'

  integration_test:
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env
        run: |
          echo "REDIS_PASSWORD=testpassword123" > .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env
          
      - name: Start services
        run: docker compose up -d --build
        
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 15
          docker compose ps
          
      - name: Submit Job and Poll
        run: |
          # Submit job
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" == "null" ]; then
            echo "Failed to submit job"
            exit 1
          fi
          echo "Submitted job: $JOB_ID"
          
          # Poll until completed or timeout
          TIMEOUT=30
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS_RES=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RES | jq -r '.status')
            echo "Job status: $STATUS"
            if [ "$STATUS" == "completed" ]; then
              echo "Job successfully completed!"
              exit 0
            fi
            sleep 2
            ELAPSED=$((ELAPSED+2))
          done
          echo "Job polling timed out"
          docker compose logs
          exit 1
          
      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env
        run: |
          echo "REDIS_PASSWORD=prodpassword123" > .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env
          
      - name: Start stack
        run: docker compose up -d
        
      - name: Scripted Rolling Update
        run: |
          echo "Simulating a scripted rolling update..."
          # A real rolling update script would pull the new image, start a new container, wait for health, and stop the old one.
          # For Docker Compose, `docker compose up -d --build` handles basic rolling updates for single replicas.
          docker compose up -d --build --no-deps
          
          # Wait for health
          echo "Checking health..."
          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if [ "$(docker inspect -f '{{.State.Health.Status}}' api)" == "healthy" ]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED+5))
          done
          echo "Health check timed out. Aborting deployment."
          exit 1
