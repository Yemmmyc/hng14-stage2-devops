services:
  redis:
    image: redis:7-alpine
    networks:
      - appnet
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always
    mem_limit: 128m
    cpus: 0.25

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - appnet
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    mem_limit: 256m
    cpus: 0.5

  worker:
    build: ./worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    command: python -u worker.py
    networks:
      - appnet
    restart: always
    mem_limit: 128m
    cpus: 0.25

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - appnet
    healthcheck:
      test: [ "CMD-SHELL", "true" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 128m
    cpus: 0.25

networks:
  appnet:
    driver: bridge
