version: "3.9"

services:
  redis:
    image: redis:7-alpine
    networks:
      - appnet

  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    build:
      context: ./worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

networks:
  appnet:
